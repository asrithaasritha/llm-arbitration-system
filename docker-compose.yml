services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000

  ui:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000/v1/arbitrate
    command: streamlit run streamlit_app.py --server.address=0.0.0.0
